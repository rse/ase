#   [plugin] lint project
lint
    markdownlint-cli2 --config etc/markdownlint.yaml skills/**/*.md

#   [plugin] build project
build : lint
    true

#   [plugin] remove all generated files
clean
    true

#   [plugin] remove all built files
distclean: clean
    shx rm -f package-lock.json
    shx rm -rf node_modules

